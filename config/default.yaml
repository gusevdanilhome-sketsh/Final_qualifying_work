# Параметры микрополосковой линии
line:
  length: 0.1         # м, длина линии
  width: 0.01         # м, ширина полоска
  height: 0.0005      # м, высота подложки
  thickness: 0.000035 # м, толщина полоска
  epsilon_r: 4.5      # относительная диэлектрическая проницаемость

# Параметры дефектов
defects:
  positions: [0.02, 0.04, 0.06, 0.08] # центры дефектов (м)
  length: 0.01                        # длина дефекта (м)
  types: [1, 2, 3, 4]                 # идентификаторы типов дефектов
  type_params:
    t1_factor: 0.7    # утонение высоты (тип 1) – множитель толщины
    W2_factor: 0.7    # утонение ширины (тип 2) – множитель ширины
    h3_factor: 0.7    # утонение подложки (тип 3) – множитель высоты
    eps4_factor: 1.3  # изменение εr (тип 4) – множитель диэлектрической проницаемости

# Параметры измерительной головки
probe:
  a: 0.002  # м, размер головки (расстояние между крайними электродами)

# Параметры измерительной системы
measurement:
  frequencies:
    start: 1  # ГГц, начальная частота
    stop: 10  # ГГц, конечная частота
    step: 1   # ГГц, шаг
  snr_db: 40  # дБ, отношение сигнал/шум (None или опустить для отключения шума)
  P0: 1.0     # Вт, мощность падающей волны

# Параметры сканирования
scan:
  x_start_offset: 0.5       # отступ от края в долях a (чтобы головка целиком помещалась на линии)
  x_step: 0.001             # м, шаг сканирования
  repeats_per_position: 10  # количество повторений для каждой позиции (разные шумы)

# Параметры модели и обучения
model:
  test_size: 0.3         # доля данных для временной выборки (30%)
  val_size_from_temp: 0.5 # доля от временной для валидации (15% от всех)
  random_state: 42       # для воспроизводимости
  cv_folds: 5            # число фолдов для кросс-валидации
  rf_params:             # сетка гиперпараметров для GridSearchCV
    n_estimators: [100, 200, 300]
    max_depth: [10, 20, 30, null]
    min_samples_leaf: [1, 2, 5]
    max_features: ['sqrt', 'log2', 0.5]

# Параметры логирования (новые)
logging:
  level: "INFO"           # уровень логирования: DEBUG, INFO, WARNING, ERROR
  file: "reports/app.log" # файл для сохранения логов (опционально)

# Параметры параллельной обработки (новые)
parallel:
  enabled: true     # использовать ли многопроцессорность при генерации данных
  num_processes: 4  # количество процессов (если null или 0, то использовать все доступные)

# Пути для сохранения файлов
paths:
  data: "data/mpl_scan_data.csv"
  model: "models/random_forest_model.pkl"
  reports: "reports/"
  figures: "reports/figures/"